<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#152238">
  <meta name="description" content="三關教學遊戲的大冒險入口地圖">
  <title>大冒險地圖｜三印之門</title>
  <style>
    :root {
      --night: #101a2b;
      --night-2: #172840;
      --panel: #213653;
      --panel-light: #2b4669;
      --cream: #fff3d1;
      --text: #f6f3e8;
      --muted: #a7b4c4;
      --gold: #f2c55c;
      --gold-2: #ffe59b;
      --green: #55c77a;
      --red: #ef6864;
      --blue: #69d4e8;
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(105, 212, 232, .13), transparent 24rem),
        radial-gradient(circle at 88% 80%, rgba(242, 197, 92, .11), transparent 28rem),
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
        var(--night);
      background-size: auto, auto, 34px 34px, 34px 34px, auto;
      font-family: ui-rounded, "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    }

    button,
    a { font: inherit; }

    .map-shell {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 34px 0 50px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 24px;
      margin-bottom: 31px;
    }

    .kicker {
      margin: 0 0 7px;
      color: var(--gold);
      font-size: .7rem;
      font-weight: 900;
      letter-spacing: .25em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 5.2rem);
      line-height: .95;
      letter-spacing: -.055em;
      text-shadow: 0 5px 0 rgba(0,0,0,.18);
    }

    h1 span { color: var(--gold-2); }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(.85rem, 2vw, 1.05rem);
    }

    .clear-button {
      min-height: 42px;
      padding: 8px 14px;
      color: #dce4ef;
      background: rgba(23, 40, 64, .82);
      border: 1px solid #49627f;
      border-radius: 999px;
      cursor: pointer;
      transition: color .15s, border-color .15s, transform .15s;
    }

    .clear-button:hover { color: white; border-color: var(--red); transform: translateY(-2px); }

    .adventure-map {
      position: relative;
      padding: clamp(18px, 4vw, 38px);
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 25%, rgba(245, 223, 157, .09) 0 2px, transparent 3px),
        repeating-linear-gradient(4deg, transparent 0 25px, rgba(4, 12, 23, .035) 26px 27px),
        linear-gradient(145deg, #294667, #1b304b);
      border: 1px solid #4c6b8c;
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .33), inset 0 0 45px rgba(4, 12, 22, .2);
    }

    .adventure-map::before,
    .adventure-map::after {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border: 2px dashed rgba(242, 197, 92, .12);
      border-radius: 50%;
      pointer-events: none;
    }

    .adventure-map::before { top: -100px; left: -80px; }
    .adventure-map::after { right: -80px; bottom: -110px; }

    .section-label {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 11px;
      margin: 0 0 18px;
      color: var(--gold-2);
      font-size: .8rem;
      font-weight: 900;
      letter-spacing: .12em;
    }

    .section-label::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, rgba(242, 197, 92, .45), transparent);
    }

    .levels {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .level-card {
      position: relative;
      min-height: 270px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 25px 18px;
      overflow: hidden;
      color: var(--text);
      text-align: center;
      text-decoration: none;
      background: linear-gradient(145deg, rgba(43, 70, 105, .96), rgba(23, 39, 62, .96));
      border: 1px solid #526d8d;
      border-radius: 20px;
      box-shadow: 0 12px 25px rgba(8, 16, 29, .28);
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }

    .level-card:hover {
      transform: translateY(-7px);
      border-color: var(--gold);
      box-shadow: 0 18px 30px rgba(8, 16, 29, .35), 0 0 22px rgba(242, 197, 92, .09);
    }

    .level-number {
      position: absolute;
      top: 13px;
      left: 14px;
      color: #869bb3;
      font-size: .62rem;
      font-weight: 900;
      letter-spacing: .12em;
    }

    .level-icon {
      display: grid;
      place-items: center;
      width: 92px;
      aspect-ratio: 1;
      margin-bottom: 16px;
      background: rgba(13, 26, 43, .46);
      border: 1px solid #587390;
      border-radius: 28px;
      font-size: 3.6rem;
      box-shadow: inset 0 0 18px rgba(0, 0, 0, .16);
      transition: transform .2s;
    }

    .level-card:hover .level-icon { transform: rotate(-4deg) scale(1.06); }

    .level-card h2 { margin: 0 0 9px; font-size: 1.35rem; }

    .status {
      padding: 5px 10px;
      color: var(--muted);
      background: rgba(4, 12, 23, .28);
      border: 1px solid #455e7a;
      border-radius: 999px;
      font-size: .69rem;
      font-weight: 900;
    }

    .level-card.completed {
      background:
        radial-gradient(circle at 50% 20%, rgba(107, 233, 143, .16), transparent 10rem),
        linear-gradient(145deg, #285a46, #183d32);
      border-color: #65d58b;
      box-shadow: 0 12px 27px rgba(8, 31, 23, .34), 0 0 20px rgba(85, 199, 122, .12);
    }

    .level-card.completed .level-icon { border-color: var(--green); box-shadow: 0 0 22px rgba(85, 199, 122, .18); }
    .level-card.completed .status { color: #d7ffe1; background: rgba(85, 199, 122, .16); border-color: var(--green); }

    .gate-area {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 28px;
      padding-top: 27px;
      border-top: 1px dashed rgba(242, 197, 92, .25);
    }

    .gate-button {
      min-width: min(330px, 100%);
      min-height: 62px;
      padding: 11px 25px;
      color: #271b08;
      background: linear-gradient(#ffe69c, #e9b94f);
      border: 1px solid #fff0b4;
      border-radius: 17px;
      box-shadow: 0 6px 0 #9f7223, 0 0 25px rgba(242, 197, 92, .17);
      font-size: 1.05rem;
      font-weight: 1000;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }

    .gate-button:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #9f7223, 0 0 34px rgba(242, 197, 92, .28); }
    .gate-button:active { transform: translateY(3px); box-shadow: 0 3px 0 #9f7223; }

    .cert-count { margin: 14px 0 0; color: var(--muted); font-size: .82rem; }
    .cert-count strong { color: var(--gold-2); }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(5, 10, 19, .82);
      backdrop-filter: blur(9px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .modal-layer.show {
      opacity: 1;
      pointer-events: auto;
    }

    .gate-modal {
      position: relative;
      width: min(770px, 100%);
      max-height: calc(100vh - 30px);
      padding: clamp(20px, 4vw, 34px);
      overflow-y: auto;
      background:
        radial-gradient(circle at 50% 0, rgba(242, 197, 92, .1), transparent 18rem),
        linear-gradient(145deg, #243a57, #14263c);
      border: 1px solid #667d98;
      border-radius: 24px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .5);
      transform: scale(.94) translateY(10px);
      transition: transform .28s cubic-bezier(.2, .8, .3, 1.2);
    }

    .modal-layer.show .gate-modal { transform: none; }

    .close-button {
      position: absolute;
      top: 13px;
      right: 13px;
      width: 38px;
      height: 38px;
      color: #c9d3df;
      background: #172940;
      border: 1px solid #4f6682;
      border-radius: 50%;
      font-size: 1.05rem;
      cursor: pointer;
    }

    .gate-title { margin: 0 0 5px; text-align: center; font-size: clamp(1.55rem, 5vw, 2.4rem); }
    .gate-note { margin: 0 0 25px; color: var(--muted); text-align: center; font-size: .78rem; }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 11px;
    }

    .cert-slot {
      position: relative;
      min-height: 145px;
      display: grid;
      place-items: center;
      padding: 12px;
      background: rgba(5, 13, 24, .35);
      border: 2px dashed #5b718c;
      border-radius: 17px;
      color: #778ba1;
      text-align: center;
      transition: background .15s, border-color .15s, transform .15s;
    }

    .cert-slot::before {
      content: "◇";
      display: block;
      font-size: 2.2rem;
      line-height: 1;
    }

    .slot-label { display: block; margin-top: 5px; font-size: .72rem; font-weight: 900; letter-spacing: .08em; }
    .cert-slot.drag-over { transform: scale(1.03); color: var(--gold); border-color: var(--gold); background: rgba(242, 197, 92, .08); }
    .cert-slot.wrong { animation: wrong-slot .32s linear; }

    @keyframes wrong-slot {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); background: rgba(239, 104, 100, .25); border-color: var(--red); }
      75% { transform: translateX(7px); background: rgba(239, 104, 100, .25); border-color: var(--red); }
    }

    .cert-slot.filled {
      background: rgba(85, 199, 122, .12);
      border-style: solid;
      border-color: var(--green);
      box-shadow: inset 0 0 25px rgba(85, 199, 122, .08), 0 0 14px rgba(85, 199, 122, .1);
    }

    .cert-slot.filled::before,
    .cert-slot.filled .slot-label { display: none; }

    .bag-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 24px 0 11px;
      color: var(--gold-2);
      font-size: .82rem;
    }

    .bag-title::after { content: ""; height: 1px; flex: 1; background: linear-gradient(90deg, #536a85, transparent); }

    .cert-bag {
      min-height: 115px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 11px;
      padding: 14px;
      background: rgba(7, 14, 27, .4);
      border: 1px solid #465d77;
      border-radius: 16px;
    }

    .empty-bag { color: #77889d; font-size: .78rem; }

    .cert-badge {
      width: 145px;
      min-height: 82px;
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 7px;
      padding: 11px;
      color: #2f220c;
      background: linear-gradient(145deg, #ffe7a0, #dba83f);
      border: 2px solid #fff0b6;
      border-radius: 14px;
      box-shadow: 0 5px 0 #966a1c, 0 8px 17px rgba(0,0,0,.2);
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: transform .15s, opacity .15s;
    }

    .cert-badge:hover { transform: translateY(-3px) rotate(-1deg); }
    .cert-badge.dragging { opacity: .35; transform: scale(.93); }
    .cert-badge.wrong-badge { animation: wrong-badge .32s ease-out; }

    @keyframes wrong-badge {
      45% { transform: translateY(-8px) rotate(5deg); filter: saturate(2); box-shadow: 0 0 20px var(--red); }
    }

    .cert-icon { font-size: 2rem; }
    .cert-name { font-size: .75rem; font-weight: 1000; }
    .cert-name small { display: block; margin-top: 2px; color: #6e5019; font-size: .58rem; }

    .cert-slot .cert-badge {
      width: min(150px, 100%);
      cursor: default;
      background: linear-gradient(145deg, #b8f0c6, #55c77a);
      border-color: #d6ffe0;
      box-shadow: 0 5px 0 #2b7e48;
      animation: seal-in .36s cubic-bezier(.2, .8, .3, 1.25);
    }

    @keyframes seal-in {
      from { transform: scale(1.35) rotate(-6deg); opacity: 0; }
      70% { transform: scale(.93) rotate(2deg); }
    }

    .touch-ghost {
      position: fixed;
      z-index: 100;
      width: 130px;
      min-height: 70px;
      display: grid;
      place-items: center;
      padding: 8px;
      color: #2f220c;
      text-align: center;
      background: #f6d36e;
      border: 2px solid white;
      border-radius: 13px;
      box-shadow: 0 14px 28px rgba(0,0,0,.32);
      font-weight: 900;
      transform: translate(-50%, -70%);
      pointer-events: none;
    }

    .gate-feedback {
      min-height: 24px;
      margin: 12px 0 0;
      color: var(--muted);
      text-align: center;
      font-size: .74rem;
    }

    .victory-screen {
      display: none;
      padding: 30px 10px 12px;
      text-align: center;
      animation: victory-in .55s cubic-bezier(.2, .8, .3, 1.2);
    }

    @keyframes victory-in {
      from { transform: scale(.72); opacity: 0; filter: blur(5px); }
    }

    .victory-screen.show { display: block; }
    .victory-icon { font-size: 5rem; filter: drop-shadow(0 0 18px rgba(242,197,92,.4)); }
    .victory-screen h2 { margin: 8px 0; color: var(--gold-2); font-size: clamp(2rem, 7vw, 3.5rem); }
    .victory-screen p { margin: 0 0 22px; color: #c7d1dd; }
    .victory-screen strong { color: var(--gold-2); font-size: 1.2rem; }

    .again-button {
      min-width: 180px;
      min-height: 50px;
      color: #271b08;
      background: var(--gold);
      border: 0;
      border-radius: 999px;
      box-shadow: 0 5px 0 #93681c;
      font-weight: 1000;
      cursor: pointer;
    }

    @media (max-width: 760px) {
      .levels { grid-template-columns: 1fr; }
      .level-card { min-height: 190px; }
      .level-icon { width: 76px; font-size: 3rem; margin-bottom: 10px; }
      .slots { grid-template-columns: 1fr; }
      .cert-slot { min-height: 105px; }
    }

    @media (max-width: 520px) {
      .map-shell { padding-top: 20px; }
      .topbar { grid-template-columns: 1fr; }
      .clear-button { justify-self: start; }
      .adventure-map { padding-inline: 12px; }
      .cert-badge { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <main class="map-shell">
    <header class="topbar">
      <div>
        <p class="kicker">THREE SEALS ADVENTURE</p>
        <h1>大冒險<span>地圖</span></h1>
        <p class="subtitle">完成 3 個關卡，拿到 3 個憑證解開大門</p>
      </div>
      <button class="clear-button" id="clear-progress" type="button">🔄 清除進度</button>
    </header>

    <section class="adventure-map">
      <h2 class="section-label">選擇冒險關卡</h2>
      <div class="levels">
        <a class="level-card" data-cert="cert_dynasty" href="../示範1_朝代配對/index.html">
          <span class="level-number">STAGE 01</span>
          <span class="level-icon" aria-hidden="true">🎴</span>
          <h2>朝代配對</h2>
          <span class="status">未完成</span>
        </a>
        <a class="level-card" data-cert="cert_idiom" href="../示範2_成語填字/index.html">
          <span class="level-number">STAGE 02</span>
          <span class="level-icon" aria-hidden="true">📝</span>
          <h2>成語填字</h2>
          <span class="status">未完成</span>
        </a>
        <a class="level-card" data-cert="cert_warrior" href="../示範3_打怪RPG/index.html">
          <span class="level-number">STAGE 03</span>
          <span class="level-icon" aria-hidden="true">⚔️</span>
          <h2>打怪 RPG</h2>
          <span class="status">未完成</span>
        </a>
      </div>

      <div class="gate-area">
        <button class="gate-button" id="open-gate" type="button">🔒 通關大門</button>
        <p class="cert-count">目前持有：<strong><span id="cert-count">0</span> / 3</strong></p>
      </div>
    </section>
  </main>

  <div class="modal-layer" id="gate-layer">
    <section class="gate-modal" role="dialog" aria-modal="true" aria-labelledby="gate-title">
      <button class="close-button" id="close-gate" type="button" aria-label="關閉">×</button>

      <div id="gate-puzzle">
        <h2 class="gate-title" id="gate-title">三印之門</h2>
        <p class="gate-note">將背包裡的憑證拖到對應凹槽；集齊三印，大門才會開啟。</p>

        <div class="slots" id="cert-slots"></div>
        <h3 class="bag-title">🎒 憑證背包</h3>
        <div class="cert-bag" id="cert-bag"></div>
        <p class="gate-feedback" id="gate-feedback">可先放入目前持有的憑證。</p>
      </div>

      <div class="victory-screen" id="victory-screen">
        <div class="victory-icon" aria-hidden="true">🏆</div>
        <h2>冒險完成！</h2>
        <p>總冒險時長<br><strong id="adventure-time">00 分 00 秒</strong></p>
        <button class="again-button" id="again-button" type="button">再次冒險</button>
      </div>
    </section>
  </div>

  <script>
    const CERTIFICATES = [
      { key: "cert_dynasty", type: "dynasty", label: "朝代", name: "朝代之印", icon: "🎴" },
      { key: "cert_idiom", type: "idiom", label: "成語", name: "成語之印", icon: "📝" },
      { key: "cert_warrior", type: "warrior", label: "勇者", name: "勇者之印", icon: "⚔️" }
    ];

    (() => {
      const gateLayer = document.querySelector("#gate-layer");
      const certSlots = document.querySelector("#cert-slots");
      const certBag = document.querySelector("#cert-bag");
      const gateFeedback = document.querySelector("#gate-feedback");
      const gatePuzzle = document.querySelector("#gate-puzzle");
      const victoryScreen = document.querySelector("#victory-screen");
      let placed = new Set();
      let touchState = null;

      function hasCert(key) {
        const value = localStorage.getItem(key);
        return value !== null && value !== "false" && value !== "0";
      }

      function importCertFromQuery() {
        const params = new URLSearchParams(location.search);
        const type = params.get("cert");
        const cert = CERTIFICATES.find((item) => item.type === type);
        if (cert) {
          localStorage.setItem(cert.key, "true");
          try {
            history.replaceState(null, "", location.pathname);
          } catch (error) {
            console.info("無法清除網址參數，但憑證已保存。");
          }
        }
      }

      function initializeAdventure() {
        importCertFromQuery();
        if (!localStorage.getItem("adventure_start")) {
          localStorage.setItem("adventure_start", String(Date.now()));
        }
        refreshProgress();
      }

      function refreshProgress() {
        let count = 0;
        document.querySelectorAll(".level-card").forEach((card) => {
          const completed = hasCert(card.dataset.cert);
          card.classList.toggle("completed", completed);
          card.querySelector(".status").textContent = completed ? "已完成 ✓" : "未完成";
          if (completed) count++;
        });
        document.querySelector("#cert-count").textContent = count;
      }

      function openGate() {
        placed = new Set();
        gatePuzzle.hidden = false;
        victoryScreen.classList.remove("show");
        renderGate();
        gateLayer.classList.add("show");
      }

      function renderGate() {
        certSlots.innerHTML = "";
        certBag.innerHTML = "";
        gateFeedback.textContent = "可先放入目前持有的憑證。";

        CERTIFICATES.forEach((cert) => {
          const slot = document.createElement("div");
          slot.className = "cert-slot";
          slot.dataset.type = cert.type;
          slot.innerHTML = `<span class="slot-label">${cert.label}</span>`;
          addSlotEvents(slot);
          certSlots.appendChild(slot);
        });

        const owned = CERTIFICATES.filter((cert) => hasCert(cert.key));
        if (owned.length === 0) {
          certBag.innerHTML = `<span class="empty-bag">背包目前是空的，先去完成一個關卡吧！</span>`;
        } else {
          owned.forEach((cert) => certBag.appendChild(createBadge(cert)));
        }
      }

      function createBadge(cert) {
        const badge = document.createElement("div");
        badge.className = "cert-badge";
        badge.dataset.type = cert.type;
        badge.draggable = true;
        badge.tabIndex = 0;
        badge.innerHTML = `
          <span class="cert-icon" aria-hidden="true">${cert.icon}</span>
          <span class="cert-name">${cert.name}<small>拖曳到「${cert.label}」凹槽</small></span>
        `;

        badge.addEventListener("dragstart", (event) => {
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", cert.type);
          badge.classList.add("dragging");
        });
        badge.addEventListener("dragend", () => {
          badge.classList.remove("dragging");
          document.querySelectorAll(".cert-slot.drag-over").forEach((slot) => slot.classList.remove("drag-over"));
        });
        badge.addEventListener("pointerdown", (event) => startTouchDrag(event, badge));
        return badge;
      }

      function addSlotEvents(slot) {
        slot.addEventListener("dragover", (event) => {
          if (slot.classList.contains("filled")) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          slot.classList.add("drag-over");
        });
        slot.addEventListener("dragleave", (event) => {
          if (!slot.contains(event.relatedTarget)) slot.classList.remove("drag-over");
        });
        slot.addEventListener("drop", (event) => {
          event.preventDefault();
          slot.classList.remove("drag-over");
          const type = event.dataTransfer.getData("text/plain");
          const badge = certBag.querySelector(`[data-type="${type}"]`);
          if (badge) attemptPlace(badge, slot);
        });
      }

      function attemptPlace(badge, slot) {
        if (slot.classList.contains("filled")) return;
        if (badge.dataset.type === slot.dataset.type) {
          badge.classList.remove("dragging", "wrong-badge");
          badge.draggable = false;
          badge.tabIndex = -1;
          slot.classList.add("filled");
          slot.appendChild(badge);
          placed.add(badge.dataset.type);
          gateFeedback.textContent = `✓ ${badge.querySelector(".cert-name").childNodes[0].textContent} 已嵌入正確位置！`;
          if (placed.size === 3) setTimeout(openVictory, 500);
        } else {
          slot.classList.remove("wrong");
          badge.classList.remove("wrong-badge", "dragging");
          void slot.offsetWidth;
          slot.classList.add("wrong");
          badge.classList.add("wrong-badge");
          gateFeedback.textContent = "位置不對，憑證已彈回背包。";
          setTimeout(() => {
            slot.classList.remove("wrong");
            badge.classList.remove("wrong-badge");
          }, 340);
        }
      }

      function startTouchDrag(event, badge) {
        if (event.pointerType === "mouse" || badge.closest(".cert-slot")) return;
        event.preventDefault();
        badge.setPointerCapture(event.pointerId);
        const ghost = document.createElement("div");
        ghost.className = "touch-ghost";
        ghost.textContent = badge.querySelector(".cert-name").childNodes[0].textContent;
        document.body.appendChild(ghost);
        touchState = { badge, ghost, pointerId: event.pointerId };
        badge.classList.add("dragging");
        moveGhost(event.clientX, event.clientY);
        badge.addEventListener("pointermove", handleTouchMove);
        badge.addEventListener("pointerup", endTouchDrag, { once: true });
        badge.addEventListener("pointercancel", cancelTouchDrag, { once: true });
      }

      function handleTouchMove(event) {
        if (!touchState || event.pointerId !== touchState.pointerId) return;
        event.preventDefault();
        moveGhost(event.clientX, event.clientY);
        document.querySelectorAll(".cert-slot.drag-over").forEach((slot) => slot.classList.remove("drag-over"));
        const target = document.elementFromPoint(event.clientX, event.clientY)?.closest(".cert-slot");
        if (target && !target.classList.contains("filled")) target.classList.add("drag-over");
      }

      function moveGhost(x, y) {
        touchState.ghost.style.left = `${x}px`;
        touchState.ghost.style.top = `${y}px`;
      }

      function endTouchDrag(event) {
        if (!touchState || event.pointerId !== touchState.pointerId) return;
        const target = document.elementFromPoint(event.clientX, event.clientY)?.closest(".cert-slot");
        const { badge } = touchState;
        cleanupTouchDrag();
        if (target && !target.classList.contains("filled")) attemptPlace(badge, target);
      }

      function cancelTouchDrag() {
        if (touchState) cleanupTouchDrag();
      }

      function cleanupTouchDrag() {
        const { badge, ghost } = touchState;
        badge.classList.remove("dragging");
        badge.removeEventListener("pointermove", handleTouchMove);
        document.querySelectorAll(".cert-slot.drag-over").forEach((slot) => slot.classList.remove("drag-over"));
        ghost.remove();
        touchState = null;
      }

      function openVictory() {
        const started = Number(localStorage.getItem("adventure_start")) || Date.now();
        const elapsedSeconds = Math.max(0, Math.floor((Date.now() - started) / 1000));
        const minutes = Math.floor(elapsedSeconds / 60);
        const seconds = elapsedSeconds % 60;
        document.querySelector("#adventure-time").textContent =
          `${String(minutes).padStart(2, "0")} 分 ${String(seconds).padStart(2, "0")} 秒`;
        gatePuzzle.hidden = true;
        victoryScreen.classList.add("show");
      }

      function clearProgress() {
        ["cert_dynasty", "cert_idiom", "cert_warrior", "adventure_start"].forEach((key) => localStorage.removeItem(key));
        localStorage.setItem("adventure_start", String(Date.now()));
        refreshProgress();
        if (gateLayer.classList.contains("show")) renderGate();
      }

      document.querySelector("#open-gate").addEventListener("click", openGate);
      document.querySelector("#close-gate").addEventListener("click", () => gateLayer.classList.remove("show"));
      gateLayer.addEventListener("click", (event) => {
        if (event.target === gateLayer) gateLayer.classList.remove("show");
      });
      document.querySelector("#clear-progress").addEventListener("click", () => {
        if (confirm("確定要清除三個關卡的冒險進度嗎？")) clearProgress();
      });
      document.querySelector("#again-button").addEventListener("click", () => {
        localStorage.clear();
        location.reload();
      });
      window.addEventListener("pageshow", refreshProgress);

      initializeAdventure();
    })();
  </script>
</body>
</html>
